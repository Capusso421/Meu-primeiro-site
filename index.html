<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capusso Sound</title>
    <style>
        :root {
            --bg-principal: #0f0f1a;
            --bg-card: #16162a;
            --texto-principal: #ffffff;
            --texto-secundario: #a0a0ca;
            --cor-primaria: #7f5af0;
            --cor-hover: #9370db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1, h2 {
            text-align: center;
            color: var(--texto-principal);
        }

        .secao {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #0f0f1a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background-color: var(--cor-primaria);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--cor-hover);
        }

        .comentario, .item-musica {
            background-color: #1e1e38;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
        }

        .btn-excluir {
            background-color: #ff4d4d;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            margin: 0;
            position: absolute;
            right: 12px;
            top: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Capusso Sound 🎵</h1>

        <div class="secao">
            <h2>Enviar Nova Música</h2>
            <form action="https://capusso-sound.onrender.com/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="musica" accept="audio/*" required>
                <button type="submit">Fazer Upload</button>
            </form>
        </div>

        <div class="secao">
            <h2>Espaço de Feedback</h2>
            <form id="formComentario">
                <input type="text" id="nome" placeholder="Seu Nome" required>
                <textarea id="mensagem" rows="3" placeholder="Deixe o seu comentário ou sugestão..." required></textarea>
                <button type="submit">Enviar Comentário</button>
            </form>

            <div id="listaComentarios">
                </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://capusso-sound.onrender.com/api/comentários';
        let senhaMestra = new URLSearchParams(window.location.search).get('admin');

        // Enviar Comentário
        document.getElementById('formComentario').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const mensagem = document.getElementById('mensagem').value;

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, mensagem })
            });

            if (res.ok) {
                document.getElementById('nome').value = '';
                document.getElementById('mensagem').value = '';
                carregarComentarios();
            } else {
                alert('Erro ao enviar comentário.');
            }
        });

        // Carregar Comentários do Servidor
        async function carregarComentarios() {
            try {
                const resposta = await fetch(API_URL);
                const comentarios = await resposta.json();
                const lista = document.getElementById('listaComentarios');
                lista.innerHTML = '';

                if (comentarios.length === 0) {
                    lista.innerHTML = '<p style="color: var(--texto-secundario); text-align: center;">Nenhum comentário ainda.</p>';
                    return;
                }

                comentarios.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'comentario';
                    
                    let botaoExcluir = senhaMestra ? `<button class="btn-excluir" onclick="excluirComentario(${c.id})">Excluir</button>` : '';
                    
                    div.innerHTML = `
                        <strong>${c.nome}</strong>
                        <p style="margin: 4px 0 0 0; color: var(--texto-secundario);">${c.mensagem}</p>
                        ${botaoExcluir}
                    `;
                    lista.appendChild(div);
                });
            } catch (error) {
                console.error("Erro ao carregar comentários:", error);
            }
        }

        // Excluir Comentário (Modo Admin)
        async function excluirComentario(id) {
            if (!confirm('Deseja mesmo apagar este comentário?')) return;
            const res = await fetch(`${API_URL}/${id}?senha=${senhaMestra}`, { method: 'DELETE' });
            if (res.ok) {
                carregarComentarios();
            } else {
                alert('Não autorizado.');
            }
        }

        // Inicializar
        carregarComentarios();
    </script>
</body>
</html>
